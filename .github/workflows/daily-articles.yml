name: Daily SEO Article Generation

on:
  schedule:
    # Run every day at 08:00 UTC (16:00 Beijing time)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      no_deploy:
        description: 'Skip Vercel deploy (dry run)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SEO-optimized articles
        id: generate
        run: node generate-articles-workflow.js --no-deploy
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "daily: SEO-optimized AI articles ($(date +%Y-%m-%d))"
            git push
            echo "✓ Changes committed and pushed"
          else
            echo "No changes to commit"
          fi

      - name: Deploy to Vercel
        if: ${{ !github.event.inputs.no_deploy }}
        run: |
          if command -v npx &> /dev/null; then
            npx vercel --prod --yes 2>/dev/null || echo "Vercel deploy skipped (no token or error)"
          else
            echo "npx not available, skipping deploy"
          fi
