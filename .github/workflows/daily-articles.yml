  name: Daily Article Generation

  on:
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Generate articles
          run: node generate-articles.js

        - name: Commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --staged --quiet || git commit -m "Article update $(date +%Y-%m-%d)"
            git push
