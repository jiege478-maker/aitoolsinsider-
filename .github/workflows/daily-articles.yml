 name: Daily Article Generation

  on:
    schedule:
      - cron: '7 6 * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Generate articles with AI
          env:
            DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          run: |
            if [ -z "$DEEPSEEK_API_KEY" ]; then
              echo "ERROR: DEEPSEEK_API_KEY secret is not set!"
              exit 1
            fi
            node generate-articles-ai.js

        - name: Update sitemap lastmod
          run: |
            sed -i "s|<lastmod>.*</lastmod>|<lastmod>$(date +%Y-%m-%d)</lastmod>|" sitemap.xml

        - name: Commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "Daily article update $(date +%Y-%m-%d)"
              git pull --rebase origin main
              git push
            else
              echo "No changes to commit"
            fi
